services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      migrations:
        condition: service_completed_successfully
    env_file:
      - .env
    volumes:
      - static_files:/home/backoffice/staticfiles
    ports:
      - "8003:8000"

  fix-permissions:
    image: alpine
    command: chown -R 1000:1000 /staticfiles
    volumes:
      - static_files:/staticfiles

  migrations:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command: sh -c "poetry run python manage.py migrate --noinput && poetry run python manage.py collectstatic --noinput --clear"
    depends_on:
      fix-permissions:
        condition: service_completed_successfully
      db:
        condition: service_started
    volumes:
      - static_files:/home/backoffice/staticfiles

  db:
    image: postgres:17.6-trixie
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - data:/var/lib/postgresql/data
    expose:
      - "5432"


volumes:
  data:
  static_files:
